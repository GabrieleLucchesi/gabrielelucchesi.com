<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <title>Gabriele Lucchesi | Sito ufficiale</title>
  <meta name="description" content="Sito ufficiale di Gabriele Lucchesi. Contatti e informazioni." />
  <meta name="robots" content="index, follow" />
  <meta name="author" content="Gabriele Lucchesi" />

  <!-- Anteprima social (WhatsApp/LinkedIn) -->
  <meta property="og:title" content="Gabriele Lucchesi" />
  <meta property="og:description" content="Contatti e informazioni ufficiali" />
  <meta property="og:image" content="https://gabrielelucchesi.com/logo.png" />
  <meta property="og:url" content="https://gabrielelucchesi.com" />
  <meta property="og:type" content="website" />

  <!-- Icona scheda browser -->
  <link rel="icon" href="logo.png" />

  <!-- Dati strutturati per Google -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Gabriele Lucchesi",
    "url": "https://gabrielelucchesi.com",
    "email": "info@gabrielelucchesi.com",
    "image": "https://gabrielelucchesi.com/logo.png"
  }
  </script>

  <style>
    :root { color-scheme: light; }
    body{
      font-family: Arial, Helvetica, sans-serif;
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#ffffff;
      color:#111;
    }
    .card{
      width:min(560px, 92vw);
      text-align:center;
      padding:34px 18px;
    }
    .logo{
      width:160px;
      height:auto;
      margin:0 auto 18px;
      display:block;
    }
    h1{
      font-size:30px;
      margin:8px 0 8px;
      letter-spacing: .2px;
    }
    p{
      margin:10px 0;
      font-size:16px;
      line-height:1.5;
      opacity:.92;
    }
    a{
      color:#111;
      text-decoration:none;
      border-bottom:1px solid rgba(0,0,0,.2);
    }
    a:hover{ border-bottom-color: rgba(0,0,0,.55); }
    .btns{
      margin-top:18px;
      display:flex;
      gap:10px;
      justify-content:center;
      flex-wrap:wrap;
    }
    .btn{
      display:inline-block;
      padding:10px 14px;
      border:1px solid rgba(0,0,0,.18);
      border-radius:10px;
      text-decoration:none;
      font-size:14px;
      background:#fff;
    }
    .foot{
      margin-top:18px;
      font-size:12px;
      opacity:.65;
    }
  </style>
</head>

<body>
  <main class="card">
    <img class="logo" src="logo.png" alt="Logo Gabriele Lucchesi">

    <h1>Gabriele Lucchesi</h1>
    <p>Per informazioni e contatti:</p>

    <p>
      <a href="mailto:info@gabrielelucchesi.com">info@gabrielelucchesi.com</a>
    </p>

    <div class="btns">
      <a class="btn" href="mailto:info@gabrielelucchesi.com">Scrivimi via email</a>
      <!-- Se vuoi, qui puoi aggiungere LinkedIn -->
      <!-- <a class="btn" href="https://www.linkedin.com/in/TUO-PROFILO" target="_blank" rel="noopener">LinkedIn</a> -->
    </div>

    <div class="foot">© <span id="y"></span> Gabriele Lucchesi</div>
  </main>

  <script>
    document.getElementById("y").textContent = new Date().getFullYear();
  </script>
</body>
</html>
